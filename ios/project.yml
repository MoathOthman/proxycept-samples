name: ProxyceptDemo
options:
  bundleIdPrefix: com.proxycept
  deploymentTarget:
    iOS: "17.0"
targets:
  ProxyceptDemo:
    type: application
    platform: iOS
    sources: [ProxyceptDemo]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proxycept.iosdemo
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: "NO"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
